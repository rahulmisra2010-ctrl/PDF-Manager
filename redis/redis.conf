# =============================================================================
# PDF-Manager — Redis Production Configuration
# Mount this file to /usr/local/etc/redis/redis.conf inside the container.
# Reference: https://raw.githubusercontent.com/redis/redis/7.2/redis.conf
# =============================================================================

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
bind              0.0.0.0
port              6379
protected-mode    yes

# ---------------------------------------------------------------------------
# Security — password authentication
# Set REDIS_PASSWORD in the environment; Compose substitutes it below.
# When using this file directly, replace ${REDIS_PASSWORD} with the real value.
# ---------------------------------------------------------------------------
requirepass       ${REDIS_PASSWORD}

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
daemonize         no           # Docker manages the process lifecycle
loglevel          notice
databases         16

# ---------------------------------------------------------------------------
# Memory management
# ---------------------------------------------------------------------------
maxmemory         512mb
maxmemory-policy  allkeys-lru  # evict least-recently-used keys when full

# ---------------------------------------------------------------------------
# Persistence — RDB snapshots
# ---------------------------------------------------------------------------
save              900 1        # save if ≥1 key changed in 15 min
save              300 10       # save if ≥10 keys changed in 5 min
save              60  10000    # save if ≥10000 keys changed in 1 min
rdbcompression    yes
rdbchecksum       yes
dbfilename        dump.rdb
dir               /data

# ---------------------------------------------------------------------------
# Persistence — Append-Only File (AOF)
# Combined with RDB for maximum durability.
# ---------------------------------------------------------------------------
appendonly        yes
appendfilename    "appendonly.aof"
appendfsync       everysec     # fsync every second (good balance of safety/perf)
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage  100
auto-aof-rewrite-min-size    64mb

# ---------------------------------------------------------------------------
# Slow log
# ---------------------------------------------------------------------------
slowlog-log-slower-than  10000   # microseconds (10 ms)
slowlog-max-len          128

# ---------------------------------------------------------------------------
# Latency monitoring
# ---------------------------------------------------------------------------
latency-monitor-threshold 100

# ---------------------------------------------------------------------------
# Keyspace notifications (useful for cache expiry events / Celery beat)
# ---------------------------------------------------------------------------
notify-keyspace-events ""         # disabled by default; enable with e.g. "Ex"

# ---------------------------------------------------------------------------
# Connections
# ---------------------------------------------------------------------------
maxclients        100
timeout           300            # close idle clients after 5 min
tcp-keepalive     60
