# =============================================================================
# PDF-Manager — PostgreSQL Production Configuration
# Mount this file to /etc/postgresql/postgresql.conf inside the container.
# Values are tuned for a moderate workload; adjust for your server's RAM/CPU.
# =============================================================================

# ---------------------------------------------------------------------------
# Connections
# ---------------------------------------------------------------------------
max_connections            = 100          # PgBouncer sits in front, so keep low
superuser_reserved_connections = 3

# ---------------------------------------------------------------------------
# Memory  (tune for available RAM — example: 4 GB server)
# ---------------------------------------------------------------------------
shared_buffers             = 1GB          # ~25 % of RAM
work_mem                   = 16MB         # per sort/hash operation
maintenance_work_mem       = 256MB
effective_cache_size       = 3GB          # ~75 % of RAM
wal_buffers                = 16MB

# ---------------------------------------------------------------------------
# Query planning
# ---------------------------------------------------------------------------
random_page_cost           = 1.1          # SSD; use 4.0 for spinning disk
effective_io_concurrency   = 200          # SSD
default_statistics_target  = 100

# ---------------------------------------------------------------------------
# WAL / checkpoints
# ---------------------------------------------------------------------------
wal_level                  = replica      # enables streaming replication
max_wal_size               = 2GB
min_wal_size               = 512MB
checkpoint_completion_target = 0.9
wal_compression            = on

# ---------------------------------------------------------------------------
# Replication (enable when using a standby)
# ---------------------------------------------------------------------------
max_wal_senders            = 3
wal_keep_size              = 1GB
hot_standby                = on

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging_collector          = on
log_directory              = '/var/log/postgresql'
log_filename               = 'postgresql-%Y-%m-%d.log'
log_rotation_age           = 1d
log_rotation_size          = 100MB
log_min_duration_statement = 1000         # log queries slower than 1 s
log_checkpoints            = on
log_connections            = on
log_disconnections         = on
log_lock_waits             = on
log_line_prefix            = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ---------------------------------------------------------------------------
# Auto-vacuum
# ---------------------------------------------------------------------------
autovacuum                 = on
autovacuum_vacuum_cost_delay = 2ms

# ---------------------------------------------------------------------------
# Performance extensions
# ---------------------------------------------------------------------------
shared_preload_libraries   = 'pg_stat_statements'
pg_stat_statements.track   = all
