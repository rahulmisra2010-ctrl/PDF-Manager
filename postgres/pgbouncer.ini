# =============================================================================
# PDF-Manager — PgBouncer Connection Pooling Configuration
# =============================================================================
# Reference: https://www.pgbouncer.org/config.html

[databases]
# Route all connections to the primary PostgreSQL instance.
# The password is read from the auth_file below.
pdfmanager = host=postgres port=5432 dbname=pdfmanager

[pgbouncer]
# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
listen_addr       = 0.0.0.0
listen_port       = 5432

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
# Use scram-sha-256 (PostgreSQL 14+ default).
auth_type         = scram-sha-256
# The auth file must contain lines in the format:
#   "username" "scram-sha-256$..." (generated by PostgreSQL's pg_authid)
auth_file         = /etc/pgbouncer/userlist.txt

# ---------------------------------------------------------------------------
# Pooling mode
# transaction  — connection returned to pool after each transaction (recommended for web apps)
# session      — one server connection per client session
# statement    — each statement gets its own connection (aggressive; rarely needed)
# ---------------------------------------------------------------------------
pool_mode         = transaction

# ---------------------------------------------------------------------------
# Pool size
# ---------------------------------------------------------------------------
max_client_conn        = 200     # max simultaneous client connections
default_pool_size      = 20      # server connections per (database, user) pair
min_pool_size          = 5       # keep a minimum ready pool
reserve_pool_size      = 5       # extra connections for bursts
reserve_pool_timeout   = 5       # seconds before using reserve pool

# ---------------------------------------------------------------------------
# Timeouts
# ---------------------------------------------------------------------------
server_connect_timeout = 15      # seconds to wait for a new server connection
server_idle_timeout    = 600     # seconds an idle server connection is kept
client_idle_timeout    = 0       # disabled — let the app manage client timeouts
query_timeout          = 120     # max seconds a query may run (0 = disabled)

# ---------------------------------------------------------------------------
# TLS (optional — enable if PostgreSQL is configured for TLS)
# ---------------------------------------------------------------------------
# server_tls_sslmode = require
# server_tls_ca_file = /etc/pgbouncer/root.crt

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_connections    = 1
log_disconnections = 1
log_pooler_errors  = 1
log_stats          = 1
stats_period       = 60

# ---------------------------------------------------------------------------
# Administration
# ---------------------------------------------------------------------------
admin_users        = pdfmanager
stats_users        = pdfmanager
