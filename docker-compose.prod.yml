# =============================================================================
# PDF-Manager — Production Docker Compose
# =============================================================================
# Usage:
#   cp .env.production .env
#   # Fill in secrets in .env
#   docker compose -f docker-compose.prod.yml up -d

services:
  # ---------------------------------------------------------------------------
  # Nginx — TLS termination & reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: pdfmanager-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certificates:/etc/letsencrypt:ro
      - nginx_dhparam:/etc/nginx/dhparam:ro
      - logs:/var/log/nginx
      - uploads:/app/uploads:ro
      - ./frontend/build:/app/static:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Web — Flask application (Gunicorn)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: pdfmanager-web:latest
    container_name: pdfmanager-web
    restart: always
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://pdfmanager:${POSTGRES_PASSWORD}@pgbouncer:5432/pdfmanager
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - EXPORT_DIR=/app/exports
      - LOG_DIR=/app/logs
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pdfmanager-postgres
    restart: always
    environment:
      POSTGRES_USER: pdfmanager
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pdfmanager
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - logs:/var/log/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfmanager -d pdfmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_directory=/var/log/postgresql
      -c logging_collector=on

  # ---------------------------------------------------------------------------
  # PgBouncer — Connection pooler for PostgreSQL
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: pgbouncer/pgbouncer:1.22.1
    container_name: pdfmanager-pgbouncer
    restart: always
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: pdfmanager
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_DBNAME: pdfmanager
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      PGBOUNCER_AUTH_TYPE: scram-sha-256
    volumes:
      - ./postgres/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "pdfmanager"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Redis — Session store, cache, rate-limit storage
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: pdfmanager-redis
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  exports:
    driver: local
  logs:
    driver: local
  certificates:
    driver: local
  nginx_dhparam:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
