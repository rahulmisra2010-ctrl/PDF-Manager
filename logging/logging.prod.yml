# =============================================================================
# PDF-Manager — Production Logging Configuration (Python logging)
# Load in Flask app via: logging.config.dictConfig(...)
# =============================================================================
version: 1
disable_existing_loggers: false

# ---------------------------------------------------------------------------
# Formatters
# ---------------------------------------------------------------------------
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

# ---------------------------------------------------------------------------
# Handlers
# ---------------------------------------------------------------------------
handlers:
  console:
    class: logging.StreamHandler
    level: WARNING
    formatter: standard
    stream: ext://sys.stdout

  app_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: /app/logs/app.log
    maxBytes: 10485760    # 10 MB
    backupCount: 10
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: /app/logs/error.log
    maxBytes: 10485760    # 10 MB
    backupCount: 10
    encoding: utf-8

  audit_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: /app/logs/audit.log
    maxBytes: 10485760    # 10 MB
    backupCount: 30       # keep 30 rotations for compliance
    encoding: utf-8

# ---------------------------------------------------------------------------
# Loggers
# ---------------------------------------------------------------------------
loggers:
  # Root application logger
  pdfmanager:
    level: INFO
    handlers: [console, app_file, error_file]
    propagate: false

  # Audit trail (auth events, document actions)
  pdfmanager.audit:
    level: INFO
    handlers: [audit_file]
    propagate: false

  # Flask / Werkzeug
  werkzeug:
    level: WARNING
    handlers: [console]
    propagate: false

  gunicorn.error:
    level: WARNING
    handlers: [error_file]
    propagate: false

  gunicorn.access:
    level: INFO
    handlers: [app_file]
    propagate: false

  sqlalchemy.engine:
    level: WARNING
    handlers: [error_file]
    propagate: false

# ---------------------------------------------------------------------------
# Root logger
# ---------------------------------------------------------------------------
root:
  level: WARNING
  handlers: [console, error_file]
