# =============================================================================
# PDF-Manager — Nginx Main Configuration
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time '
                      'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;        # hide Nginx version

    # Buffer sizes
    client_body_buffer_size    128k;
    client_max_body_size       100m;   # allow large PDF uploads
    client_header_buffer_size  1k;
    large_client_header_buffers 4 16k;

    # Timeouts
    client_body_timeout    30s;
    client_header_timeout  30s;
    send_timeout           30s;

    # ---------------------------------------------------------------------------
    # Rate limiting zones (defined here, applied per-location in conf.d)
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

    # ---------------------------------------------------------------------------
    # Upstream — Flask/Gunicorn backend
    # ---------------------------------------------------------------------------
    upstream pdfmanager_backend {
        least_conn;
        server web:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # Include per-feature configuration fragments
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
