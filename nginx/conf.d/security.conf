# =============================================================================
# PDF-Manager — Nginx Security Headers Configuration
# These headers are added to every HTTPS response via the `add_header`
# directive.  Include this file inside an `http` block (via conf.d).
# =============================================================================

# ---------------------------------------------------------------------------
# Prevent browsers from sniffing the MIME type
# ---------------------------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;

# ---------------------------------------------------------------------------
# Clickjacking protection — only allow embedding within same origin
# ---------------------------------------------------------------------------
add_header X-Frame-Options "SAMEORIGIN" always;

# ---------------------------------------------------------------------------
# Enable XSS filter in legacy browsers
# ---------------------------------------------------------------------------
add_header X-XSS-Protection "1; mode=block" always;

# ---------------------------------------------------------------------------
# HTTP Strict Transport Security (HSTS)
# max-age = 1 year; includeSubDomains + preload for maximum protection
# NOTE: only activate preload after verifying the site works over HTTPS.
# ---------------------------------------------------------------------------
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ---------------------------------------------------------------------------
# Referrer Policy — don't leak internal URLs to external sites
# ---------------------------------------------------------------------------
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---------------------------------------------------------------------------
# Permissions Policy — disable unused browser features
# ---------------------------------------------------------------------------
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# ---------------------------------------------------------------------------
# Content Security Policy
# Adjust the directives below to match your exact front-end requirements.
# ---------------------------------------------------------------------------
add_header Content-Security-Policy "
  default-src 'self';
  script-src  'self' 'unsafe-inline' 'unsafe-eval';
  style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src    'self' https://fonts.gstatic.com;
  img-src     'self' data: blob:;
  connect-src 'self';
  frame-src   'none';
  object-src  'none';
  base-uri    'self';
  form-action 'self';
" always;
