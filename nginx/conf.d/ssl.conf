# =============================================================================
# PDF-Manager — Nginx SSL/TLS Configuration
# Include this file inside an `http` block (via conf.d).
# =============================================================================

# ---------------------------------------------------------------------------
# SSL global settings (applied to all server blocks)
# ---------------------------------------------------------------------------
ssl_protocols              TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers  on;
ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

# Diffie-Hellman parameters (generate once: openssl dhparam -out /etc/nginx/dhparam/dhparam.pem 4096)
ssl_dhparam                /etc/nginx/dhparam/dhparam.pem;

# Session caching reduces handshake overhead
ssl_session_cache    shared:SSL:10m;
ssl_session_timeout  10m;
ssl_session_tickets  off;

# OCSP Stapling — reduces latency by caching certificate revocation info
ssl_stapling         on;
ssl_stapling_verify  on;
resolver             8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout     5s;

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # Allow ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
