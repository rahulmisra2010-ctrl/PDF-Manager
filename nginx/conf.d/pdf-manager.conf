# =============================================================================
# PDF-Manager — Nginx Application Proxy Configuration
# HTTPS virtual host: terminates SSL and proxies to Flask/Gunicorn backend.
# =============================================================================

server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  ${DOMAIN_NAME:-localhost};

    # ---------------------------------------------------------------------------
    # SSL certificate paths (managed by certbot / Let's Encrypt)
    # ---------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN_NAME:-localhost}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME:-localhost}/privkey.pem;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    access_log  /var/log/nginx/pdfmanager_access.log  main;
    error_log   /var/log/nginx/pdfmanager_error.log   warn;

    # ---------------------------------------------------------------------------
    # Static files — served directly by Nginx (React build)
    # ---------------------------------------------------------------------------
    location /static/ {
        root      /app;
        expires   7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    location /uploads/ {
        # Uploaded PDFs: served by backend for access-control checks
        deny all;
    }

    # ---------------------------------------------------------------------------
    # API — reverse proxy to Flask/Gunicorn
    # ---------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass          http://pdfmanager_backend;
        proxy_http_version  1.1;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";

        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     30s;

        # Buffer settings for large PDF uploads
        proxy_request_buffering    off;
        proxy_buffering            on;
        proxy_buffer_size          16k;
        proxy_buffers              8 64k;
        proxy_busy_buffers_size    128k;
    }

    # Upload endpoint — stricter rate limit
    location /api/v1/upload {
        limit_req zone=upload burst=5 nodelay;

        proxy_pass          http://pdfmanager_backend;
        proxy_http_version  1.1;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";

        proxy_connect_timeout   10s;
        proxy_read_timeout      300s;  # PDF processing can take time
        proxy_request_buffering off;
    }

    # ---------------------------------------------------------------------------
    # Everything else — Flask renders HTML pages
    # ---------------------------------------------------------------------------
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass          http://pdfmanager_backend;
        proxy_http_version  1.1;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";

        proxy_connect_timeout  10s;
        proxy_read_timeout     60s;
        proxy_send_timeout     30s;
    }

    # ---------------------------------------------------------------------------
    # Custom error pages
    # ---------------------------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
