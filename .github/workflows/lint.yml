name: Lint

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8 black isort pylint

      - name: flake8 (syntax errors & undefined names)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: flake8 (full style)
        run: flake8 . --count --max-line-length=88 --extend-ignore=E203,W503 --statistics || true

      - name: black (format check)
        run: black --check --diff .

      - name: isort (import order check)
        run: isort --check-only --diff .
