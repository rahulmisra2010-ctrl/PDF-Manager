name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Frontend: Lint, Test, Build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint with ESLint
        run: npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings=0

      - name: Run unit tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build application
        run: npm run build
        env:
          CI: false

  # ─────────────────────────────────────────────
  # Backend: Lint, Test, Coverage
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 \
            libgl1 \
            tesseract-ocr

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,__pycache__,frontend,static,migrations,.env
          # Warn on style issues (max line length 120)
          flake8 . --count --max-line-length=120 --statistics \
            --exclude=.git,__pycache__,frontend,static,migrations,.env \
            --exit-zero

      - name: Run tests with pytest
        run: |
          pytest test_app.py -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-omit="frontend/*,static/*,migrations/*,*/__pycache__/*"
        env:
          TESTING: 'true'
          ADMIN_PASSWORD: 'ci-test-password'
          SECRET_KEY: 'ci-test-secret-key'
          SQLALCHEMY_DATABASE_URI: 'sqlite:///:memory:'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 7
