[pytest]
testpaths = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v
    --cov=.
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-omit=frontend/*,docs/*,*/migrations/*,*/__pycache__/*

[coverage:run]
source = .
omit =
    frontend/*
    docs/*
    */migrations/*
    */__pycache__/*
    */test_*.py
    */*_test.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == __main__:
    pass
    except ImportError
