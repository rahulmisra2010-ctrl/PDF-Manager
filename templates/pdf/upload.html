{% extends "base.html" %}
{% block title %}Upload PDF — PDF Manager{% endblock %}

{% block content %}
<h2 class="mb-4">Upload PDF</h2>

<div class="card" style="max-width: 600px;">
  <div class="card-body">
    <form method="POST" action="{{ url_for('pdf.upload') }}" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label for="file" class="form-label fw-semibold">Select PDF file</label>
        <input type="file" class="form-control" id="file" name="file"
               accept=".pdf" required>
        <div class="form-text">Maximum file size: 50 MB.</div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-upload me-1"></i>Upload
        </button>
        <a href="{{ url_for('pdf.list_documents') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
