# =============================================================================
# PDF-Manager — Prometheus Alerting Rules
# =============================================================================

groups:
  - name: pdf-manager
    rules:
      # -----------------------------------------------------------------------
      # Application availability
      # -----------------------------------------------------------------------
      - alert: AppDown
        expr: up{job="pdf-manager-web"} == 0
        for: 1m
        labels:
          severity: critical
          service: pdf-manager
        annotations:
          summary: "PDF-Manager application is down"
          description: "The Flask/Gunicorn service has been unreachable for >1 minute."

      # -----------------------------------------------------------------------
      # High error rate
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          rate(flask_http_request_total{status=~"5.."}[5m])
          / rate(flask_http_request_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          service: pdf-manager
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%)."

      # -----------------------------------------------------------------------
      # Slow responses
      # -----------------------------------------------------------------------
      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(flask_http_request_duration_seconds_bucket[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
          service: pdf-manager
        annotations:
          summary: "P95 response time > 1s"
          description: "95th percentile response time is {{ $value | humanizeDuration }}."

  - name: database
    rules:
      # -----------------------------------------------------------------------
      # PostgreSQL down
      # -----------------------------------------------------------------------
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is unreachable"
          description: "The PostgreSQL exporter cannot connect to the database."

      # -----------------------------------------------------------------------
      # Connection saturation
      # -----------------------------------------------------------------------
      - alert: PostgreSQLTooManyConnections
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connection pool near capacity"
          description: "{{ $value | humanizePercentage }} of max_connections used."

  - name: infrastructure
    rules:
      # -----------------------------------------------------------------------
      # High CPU
      # -----------------------------------------------------------------------
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}%."

      # -----------------------------------------------------------------------
      # Low disk space
      # -----------------------------------------------------------------------
      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"}
           / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value | humanize }}% disk space remaining."

      # -----------------------------------------------------------------------
      # Redis down
      # -----------------------------------------------------------------------
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is unreachable"
          description: "The Redis exporter cannot connect to the Redis instance."
