# =============================================================================
# PDF-Manager — Alertmanager Configuration
# Reference: https://prometheus.io/docs/alerting/latest/configuration/
# =============================================================================
global:
  resolve_timeout: 5m
  smtp_smarthost: "${MAIL_SERVER}:${MAIL_PORT}"
  smtp_from: "${MAIL_DEFAULT_SENDER}"
  smtp_auth_username: "${MAIL_USERNAME}"
  smtp_auth_password: "${MAIL_PASSWORD}"

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: pagerduty
      repeat_interval: 1h

receivers:
  - name: default
    email_configs:
      - to: "${ALERT_EMAIL:-ops@example.com}"
        send_resolved: true
        headers:
          Subject: "[PDF-Manager] {{ .Status | title }}: {{ .CommonAnnotations.summary }}"

  - name: pagerduty
    # Uncomment and configure when PagerDuty is available:
    # pagerduty_configs:
    #   - routing_key: "${PAGERDUTY_KEY}"
    #     description: "{{ .CommonAnnotations.description }}"
    email_configs:
      - to: "${ALERT_EMAIL:-ops@example.com}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "service"]
