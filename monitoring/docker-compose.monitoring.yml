# =============================================================================
# PDF-Manager — Monitoring Stack (ELK + Prometheus + Grafana)
# Run alongside docker-compose.prod.yml:
#   docker compose -f docker-compose.prod.yml \
#                  -f monitoring/docker-compose.monitoring.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Elasticsearch — log storage and search
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: pdfmanager-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qv red"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Logstash — log ingestion and parsing pipeline
  # ---------------------------------------------------------------------------
  logstash:
    image: logstash:8.13.4
    container_name: pdfmanager-logstash
    restart: always
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Kibana — log visualization
  # ---------------------------------------------------------------------------
  kibana:
    image: kibana:8.13.4
    container_name: pdfmanager-kibana
    restart: always
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: pdfmanager-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Grafana — metrics visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: pdfmanager-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Alertmanager — alert routing
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: pdfmanager-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Exporters
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: pdfmanager-node-exporter
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pdfmanager-postgres-exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://pdfmanager:${POSTGRES_PASSWORD}@postgres:5432/pdfmanager?sslmode=disable
    networks:
      - monitoring
      - backend

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: pdfmanager-redis-exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - monitoring
      - backend

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: pdfmanager-nginx-exporter
    restart: always
    command:
      - "--nginx.scrape-uri=http://nginx/nginx_status"
    depends_on:
      - nginx
    networks:
      - monitoring
      - frontend

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

# ---------------------------------------------------------------------------
# Networks (reference external networks from the main compose file)
# ---------------------------------------------------------------------------
networks:
  monitoring:
    driver: bridge
  backend:
    external: true
  frontend:
    external: true
