# =============================================================================
# PDF-Manager — Logstash Pipeline Configuration
# Receives Filebeat events and ships them to Elasticsearch.
# =============================================================================

input {
  beats {
    port => 5044
  }
}

filter {
  # ---------------------------------------------------------------------------
  # Parse Nginx access log (combined format)
  # ---------------------------------------------------------------------------
  if [log_type] == "access" and [service] == "nginx" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code:int} %{NUMBER:bytes_sent:int} "%{DATA:referrer}" "%{DATA:user_agent}" rt=%{NUMBER:request_time:float}'
      }
      remove_field => ["message"]
    }
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # ---------------------------------------------------------------------------
  # Parse JSON application logs (Gunicorn / Flask)
  # ---------------------------------------------------------------------------
  if [log_type] == "application" {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }
  }

  # ---------------------------------------------------------------------------
  # Add common metadata
  # ---------------------------------------------------------------------------
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "pdfmanager"
    }
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOSTS}"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index    => "%{[@metadata][index_prefix]}-%{[service]}-%{+YYYY.MM.dd}"
  }
}
